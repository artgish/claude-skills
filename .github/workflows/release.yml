name: skills

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Validate skills
        run: |
          if [ -d skills ] && [ -n "$(ls -A skills 2>/dev/null)" ]; then
            python scripts/validate.py skills/
          else
            echo "no skills yet — skipping validation"
          fi

      - name: Package skills
        run: |
          if [ -d skills ] && [ -n "$(ls -A skills 2>/dev/null)" ]; then
            bash scripts/package-all.sh
          else
            echo "no skills yet — skipping packaging"
            mkdir -p dist
          fi

      - name: Upload .skill artifacts
        if: hashFiles('dist/*.skill') != ''
        uses: actions/upload-artifact@v7.0.1
        with:
          name: skills
          path: dist/*.skill
          if-no-files-found: ignore

  release:
    needs: validate-and-package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: skills
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/*.skill
          generate_release_notes: true
